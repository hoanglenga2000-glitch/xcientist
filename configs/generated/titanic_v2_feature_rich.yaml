data:
  sample_submission: tasks/titanic/data/sample_submission.csv
  task_dir: tasks/titanic
  test: tasks/titanic/data/test.csv
  train: tasks/titanic/data/train.csv
  variant_of: titanic
feature_engineering:
  categorical_strategy: target_encoding
  derived_features:
  - title_from_name
  - family_size
  - cabin_deck
  - fare_bin
  - age_bin
  drop_columns:
  - Ticket
  numeric_strategy: knn_impute
  preset: titanic_feature_rich
  target_transform: null
scaffold:
  first_stage_models:
  - logistic_regression
  - random_forest
  - xgboost
  - lightgbm
  - catboost
  risk_points:
  - Age and Cabin have high missing rates.
  - Train/test feature columns must stay aligned.
  - Submission must keep PassengerId and Survived columns.
  - Local validation is only a proxy before official Kaggle submission.
  time_budget_minutes: 15
  validation_strategy: 10-fold stratified CV with feature selection
task:
  competition: Titanic - Feature Rich Variant
  metric: accuracy
  name: titanic_v2_feature_rich
  target: Survived
  type: binary_classification
thresholds:
  min_validation_accuracy: 0.8
  require_no_missing_predictions: true
  require_submission_schema_valid: true
  require_train_test_features_match: true
workflow:
- task_understanding
- preliminary_eda
- data_quality_check
- feature_engineering
- model_validation
- submission_generation
- report_and_review
