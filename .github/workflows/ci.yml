name: CI

on:
  push:
    branches: [master, "codex/**"]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  python-release:
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
      - name: Install test and build dependencies
        run: python -m pip install -r requirements-dev.txt build
      - name: Run production stability gate
        if: matrix.python-version == '3.11'
        run: python scripts/run_ci_checks.py
      - name: Build wheel and source distribution
        run: python -m build
      - name: Install wheel in a clean environment
        shell: pwsh
        run: |
          python -m venv .release-smoke
          .\.release-smoke\Scripts\python.exe -m pip install --upgrade pip
          $wheel = Get-ChildItem dist\*.whl | Select-Object -First 1
          .\.release-smoke\Scripts\python.exe -m pip install $wheel.FullName
          .\.release-smoke\Scripts\python.exe -m pip check
          $versionMatch = Select-String -LiteralPath pyproject.toml -Pattern '^version\s*=\s*"([^"]+)"'
          $expectedVersion = $versionMatch.Matches[0].Groups[1].Value
          $version = .\.release-smoke\Scripts\python.exe -c "import importlib.metadata; print(importlib.metadata.version('xcientist'))"
          if ($version -ne $expectedVersion) { throw "Installed xcientist $version, expected $expectedVersion" }
          .\.release-smoke\Scripts\evomind.exe --help
          .\.release-smoke\Scripts\evomind.exe workspace --help
          .\.release-smoke\Scripts\evomind.exe benchmark-agent --help

  frontend-release:
    runs-on: windows-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: web/research-agent-workstation
    env:
      DATABASE_URL: file:./ci-workstation.db
      NEXT_TELEMETRY_DISABLED: "1"
      RUST_LOG: info
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/research-agent-workstation/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Create clean SQLite schema
        run: npm run db:push -- --skip-generate
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Typecheck
        run: npm run typecheck
      - name: Build workstation
        run: npm run build

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [python-release, frontend-release]
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $packageVersion = python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])"
          $tagVersion = $env:GITHUB_REF_NAME.TrimStart('v')
          if ($packageVersion -ne $tagVersion) {
            throw "Tag $env:GITHUB_REF_NAME does not match package version $packageVersion"
          }
      - name: Build release assets and SBOM
        shell: pwsh
        run: |
          python -m pip install --upgrade pip build cyclonedx-bom
          python -m build
          python -m venv .release-sbom
          $wheel = Get-ChildItem dist\*.whl | Select-Object -First 1
          .\.release-sbom\Scripts\python.exe -m pip install --upgrade pip
          .\.release-sbom\Scripts\python.exe -m pip install $wheel.FullName
          .\.release-sbom\Scripts\python.exe -m pip check
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          cyclonedx-py environment --pyproject pyproject.toml --mc-type application --output-reproducible --of JSON -o "dist\xcientist-$version.cdx.json" .\.release-sbom\Scripts\python.exe
          $lines = Get-ChildItem dist -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          }
          [System.IO.File]::WriteAllLines(
            (Join-Path $PWD 'dist\SHA256SUMS.txt'),
            $lines,
            [System.Text.UTF8Encoding]::new($false)
          )
      - name: Attest release provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*
      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $assets = Get-ChildItem dist -File | Sort-Object Name | ForEach-Object FullName
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag --verify-tag --title "EvoMind $tag" --generate-notes @assets
          }
